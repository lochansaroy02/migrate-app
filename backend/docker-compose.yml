version: "3.9"

services:
  # ── Application PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: databridge
      POSTGRES_PASSWORD: databridge_secret
      POSTGRES_DB: databridge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U databridge -d databridge"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI API server ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
      "
    volumes:
      - .:/app  # remove in production; only for development hot-reload

  # ── Celery worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app.celery_app worker
        --loglevel=info
        --concurrency=4
        --queues=celery
    volumes:
      - .:/app  # remove in production

  # ── Celery Flower (monitoring UI) ───────────────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
      - worker
    ports:
      - "5555:5555"
    command: >
      celery -A app.workers.celery_app.celery_app flower
        --port=5555
        --broker=${REDIS_URL}

volumes:
  postgres_data:
